name: ShellSpark CI

on:
  push:
  pull_request:

jobs:
  cli-tests:
    name: CLI Tests (${{ matrix.os }} / py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install ShellSpark
        run: pip install .

      - name: shellspark --help
        run: shellspark --help

      - name: sx --help
        run: sx --help

      # CI-safe deterministic commands (no AI / no API key)
      - name: Basic safe query
        run: shellspark "pwd"

      - name: Explain mode query
        run: shellspark --explain "pwd"

      - name: Import check
        run: |
          python -c "import sys; print('Python:', sys.version)"
          python -c "import shellspark; print('ShellSpark import OK')"